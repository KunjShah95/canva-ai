services:
  postgres:
    image: postgres:16-alpine
    container_name: canva_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: image_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: canva_ai_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/image_editor?schema=public
      JWT_SECRET: replace-with-strong-secret
      FRONTEND_URL: http://localhost:8080
      ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
    container_name: canva_ai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:8080"

volumes:
  postgres_data:
